<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Musical Designer</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#1a1917" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Song Plot" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sb-brand">
      <span class="sb-logo">♪</span>
      <span class="sb-appname">Song Plot</span>
    </div>

    <nav class="sb-nav">
      <button class="sb-item" data-page="board" title="Board">
        <span class="sb-icon">⊞</span>
        <span class="sb-label">Board</span>
      </button>
      <button class="sb-item" data-page="titlepage" title="Title Pages">
        <span class="sb-icon">◧</span>
        <span class="sb-label">Title Pages</span>
      </button>
      <button class="sb-item" data-page="manuscript" title="Manuscript">
        <span class="sb-icon">≡</span>
        <span class="sb-label">Manuscript</span>
      </button>
      <button class="sb-item" data-page="characters" title="Characters">
        <span class="sb-icon">◎</span>
        <span class="sb-label">Characters</span>
      </button>
      <button class="sb-item" data-page="export" title="Export / Backup">
        <span class="sb-icon">↓</span>
        <span class="sb-label">Export</span>
      </button>
    </nav>

    <button class="sb-darkmode" id="sb-darkmode" title="Toggle dark mode">
      <span class="sb-icon sb-dm-icon">☀</span>
      <span class="sb-label">Light mode</span>
    </button>

    <div class="sb-show-area">
      <button class="sb-show-btn" id="sb-show-btn" title="Switch show">
        <span class="sb-save-dot" id="save-ind" title="Saved"></span>
        <span class="sb-show-name" id="sb-show-name">—</span>
        <span class="sb-show-caret">
          <svg viewBox="0 0 10 6" width="10" height="6" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>
    </div>

    <button class="sb-toggle" id="sb-toggle" title="Toggle sidebar">
      <svg viewBox="0 0 18 14" width="18" height="14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0.6" y="0.6" width="16.8" height="12.8" rx="2.2" stroke="currentColor" stroke-width="1.2"/>
        <line x1="6" y1="0.6" x2="6" y2="13.4" stroke="currentColor" stroke-width="1.2"/>
        <rect class="sb-toggle-panel" x="0.6" y="0.6" width="5.4" height="12.8" rx="2.2" fill="currentColor" opacity="0.25"/>
      </svg>
    </button>
  </aside>

  <!-- Main content -->
  <div id="app-root" class="app-root">

    <!-- Library page -->
    <div id="page-library" class="page" style="display:none">
      <div class="lib-header">
        <h1 class="lib-title">Library</h1>
        <div class="lib-actions">
          <label class="lib-archtoggle"><input type="checkbox" id="lib-show-archived" /> Show archived</label>
          <button class="pbtn primary" id="lib-new">+ New show</button>
        </div>
      </div>
      <div id="lib-grid" class="lib-grid"></div>
    </div>

    <!-- Board page -->
    <div id="page-board" class="page">
      <div class="board-header">
        <div class="board-controls">
          <div class="control-group">
            <label>View</label>
            <div class="seg" id="view-seg">
              <button data-view="full" class="active">Full story</button>
              <button data-view="songs">Songs only</button>
            </div>
          </div>
          <div class="stats" id="stats"></div>
        </div>
      </div>
      <div id="board"></div>
      <p class="hint"><b>Click a card</b> to open its editor. <b>Drag</b> sideways to re-order, or into another lane to change act. <b>+</b> in a lane to add a card.</p>
    </div>

    <!-- Manuscript page -->
    <div id="page-manuscript" class="page" style="display:none">
      <div class="ms-toolbar" id="ms-toolbar"></div>
      <div class="ms-body" id="ms-body"></div>
    </div>

    <!-- Title Pages page -->
    <div id="page-titlepage" class="page" style="display:none"></div>

    <!-- Characters page -->
    <div id="page-characters" class="page" style="display:none"></div>

    <!-- Export page -->
    <div id="page-export" class="page" style="display:none"></div>

  </div>

  <!-- Show settings modal -->
  <div id="show-settings-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">Show settings</h3>
      <div class="fld">
        <span class="fl">Title</span>
        <input class="fi" type="text" id="ssm-title" placeholder="My Musical" />
      </div>
      <div class="fld">
        <span class="fl">Format</span>
        <div class="seg" id="ssm-mode-seg">
          <button data-mode="full" class="active">Full length</button>
          <button data-mode="oneact">One-act (90 min)</button>
        </div>
      </div>
      <div class="fld">
        <span class="fl">Status</span>
        <div class="seg" id="ssm-status-seg">
          <button data-status="draft">Draft</button>
          <button data-status="active" class="active">Active</button>
          <button data-status="archived">Archived</button>
        </div>
      </div>
      <div class="modal-btns">
        <button id="ssm-share" class="pbtn" style="margin-right:auto">Share…</button>
        <button id="ssm-cancel" class="pbtn">Cancel</button>
        <button id="ssm-save" class="pbtn primary">Save</button>
      </div>
    </div>
  </div>

  <!-- New show modal -->
  <div id="new-show-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">New show</h3>
      <div class="fld">
        <span class="fl">Title</span>
        <input class="fi" type="text" id="nsm-title" placeholder="My Musical" />
      </div>
      <div class="fld">
        <span class="fl">Length</span>
        <div class="seg" id="nsm-mode-seg">
          <button data-mode="full" class="active">Full length</button>
          <button data-mode="oneact">One-act (90 min)</button>
        </div>
      </div>
      <div class="modal-btns">
        <button id="nsm-cancel" class="pbtn">Cancel</button>
        <button id="nsm-create" class="pbtn primary">Create show</button>
      </div>
    </div>
  </div>

  <!-- Folder picker modal -->
  <div id="folder-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">Move to folder</h3>
      <div id="folder-list" class="folder-list"></div>
      <div class="fld">
        <span class="fl">New folder</span>
        <input class="fi" type="text" id="folder-new" placeholder="Folder name" />
      </div>
      <div class="modal-btns">
        <button id="folder-cancel" class="pbtn">Cancel</button>
        <button id="folder-create" class="pbtn primary">Create &amp; move</button>
      </div>
    </div>
  </div>

  <!-- Share modal -->
  <div id="share-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">Share show</h3>
      <p class="share-sub" id="share-sub">Choose who can open and edit this show.</p>
      <div id="share-list" class="share-list"></div>
      <div class="modal-btns">
        <button id="share-cancel" class="pbtn">Cancel</button>
        <button id="share-save" class="pbtn primary">Save sharing</button>
      </div>
    </div>
  </div>

  <div id="backdrop" class="backdrop" style="display:none"></div>
  <div id="detail" class="detail" style="display:none"></div>
  <div id="lyricwin" class="lyricwin-overlay" style="display:none"></div>

  <script src="data.js"></script>
  <script src="lyric.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
