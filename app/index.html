<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Musical Designer</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#3a3475" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Song Plot" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Top navigation -->
  <header id="topnav" class="topnav">
    <div class="tn-bar">
      <div class="tn-left">
        <button class="tn-tab tn-iconbtn tn-library" data-page="library" title="Library" aria-label="Library"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.5C10.5 5.3 8.5 4.7 5 4.7c-1 0-1.5.2-1.5 1V18c0 .8.5 1 1.5 1 3.3 0 5.3.6 6.5 1.6"/><path d="M12 6.5C13.5 5.3 15.5 4.7 19 4.7c1 0 1.5.2 1.5 1V18c0 .8-.5 1-1.5 1-3.3 0-5.3.6-6.5 1.6"/><path d="M12 6.5V20.6"/></svg></button>
        <button class="tn-show-btn" id="sb-show-btn" title="Switch show">
          <span class="sb-save-dot" id="save-ind" title="Saved"></span>
          <span class="sb-show-name" id="sb-show-name">—</span>
          <span class="tn-caret"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></span>
        </button>
      </div>

      <nav class="tn-nav">
        <button class="tn-tab" data-page="board">Board</button>
        <button class="tn-tab" data-page="storydna">Story DNA</button>
        <button class="tn-tab" data-page="titlepage">Title pages</button>
        <button class="tn-tab" data-page="manuscript">Manuscript</button>
        <button class="tn-tab" data-page="characters">Characters</button>
        <button class="tn-tab" data-page="export">Export</button>
      </nav>

      <div class="tn-right">
        <button class="tn-iconbtn" id="sb-snapshots" title="Snapshots" aria-label="Snapshots"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v5h5"/><path d="M3.05 13a9 9 0 1 0 2.6-7.1L3 8"/><path d="M12 7v5l3 2"/></svg></button>
        <button class="tn-iconbtn" id="sb-darkmode" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span class="sb-dm-icon">☀</span>
          <span class="sb-label" hidden></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <div id="app-root" class="app-root">

    <!-- Library page -->
    <div id="page-library" class="page" style="display:none">
      <div class="lib-header">
        <h1 class="lib-title">Library</h1>
        <div class="lib-actions">
          <label class="lib-archtoggle"><input type="checkbox" id="lib-show-archived" /> Show archived</label>
          <button class="pbtn primary" id="lib-new">+ New show</button>
        </div>
      </div>
      <div id="lib-grid" class="lib-grid"></div>
    </div>

    <!-- Board page -->
    <div id="page-board" class="page">
      <div class="board-header ribbon">
        <div class="seg" id="view-seg">
          <button data-view="full" class="active">Full story</button>
          <button data-view="songs">Songs only</button>
        </div>
        <div class="stats" id="stats"></div>
      </div>
      <div id="board"></div>
      <p class="hint"><b>Click a card</b> to open its editor. <b>Drag</b> sideways to re-order, or into another lane to change act. <b>+</b> in a lane to add a card.</p>
    </div>

    <!-- Manuscript page -->
    <div id="page-manuscript" class="page" style="display:none">
      <div class="ms-toolbar" id="ms-toolbar"></div>
      <div class="ms-body" id="ms-body"></div>
    </div>

    <!-- Story DNA page -->
    <div id="page-storydna" class="page" style="display:none"></div>

    <!-- Title Pages page -->
    <div id="page-titlepage" class="page" style="display:none"></div>

    <!-- Characters page -->
    <div id="page-characters" class="page" style="display:none"></div>

    <!-- Export page -->
    <div id="page-export" class="page" style="display:none"></div>

  </div>

  <!-- Show settings modal -->
  <div id="show-settings-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">Show settings</h3>
      <div class="fld">
        <span class="fl">Title</span>
        <input class="fi" type="text" id="ssm-title" placeholder="My Musical" />
      </div>
      <div class="fld">
        <span class="fl">Format</span>
        <div class="seg" id="ssm-mode-seg">
          <button data-mode="full" class="active">Full length</button>
          <button data-mode="oneact">One-act (90 min)</button>
        </div>
      </div>
      <div class="fld">
        <span class="fl">Status</span>
        <div class="seg" id="ssm-status-seg">
          <button data-status="draft">Draft</button>
          <button data-status="active" class="active">Active</button>
          <button data-status="archived">Archived</button>
        </div>
      </div>
      <div class="modal-btns">
        <button id="ssm-share" class="pbtn" style="margin-right:auto">Share…</button>
        <button id="ssm-cancel" class="pbtn">Cancel</button>
        <button id="ssm-save" class="pbtn primary">Save</button>
      </div>
    </div>
  </div>

  <!-- New show modal -->
  <div id="new-show-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">New show</h3>
      <div class="fld">
        <span class="fl">Title</span>
        <input class="fi" type="text" id="nsm-title" placeholder="My Musical" />
      </div>
      <div class="fld">
        <span class="fl">Length</span>
        <div class="seg" id="nsm-mode-seg">
          <button data-mode="full" class="active">Full length</button>
          <button data-mode="oneact">One-act (90 min)</button>
        </div>
      </div>
      <div class="modal-btns">
        <button id="nsm-cancel" class="pbtn">Cancel</button>
        <button id="nsm-create" class="pbtn primary">Create show</button>
      </div>
    </div>
  </div>

  <!-- Folder picker modal -->
  <div id="folder-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">Move to folder</h3>
      <div id="folder-list" class="folder-list"></div>
      <div class="fld">
        <span class="fl">New folder</span>
        <input class="fi" type="text" id="folder-new" placeholder="Folder name" />
      </div>
      <div class="modal-btns">
        <button id="folder-cancel" class="pbtn">Cancel</button>
        <button id="folder-create" class="pbtn primary">Create &amp; move</button>
      </div>
    </div>
  </div>

  <!-- Share modal -->
  <div id="share-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">Share show</h3>
      <p class="share-sub" id="share-sub">Choose who can open and edit this show.</p>
      <div id="share-list" class="share-list"></div>
      <div class="modal-btns">
        <button id="share-cancel" class="pbtn">Cancel</button>
        <button id="share-save" class="pbtn primary">Save sharing</button>
      </div>
    </div>
  </div>

  <div id="lyricwin" class="lyricwin-overlay" style="display:none"></div>

  <script src="data.js"></script>
  <script src="lyric.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
